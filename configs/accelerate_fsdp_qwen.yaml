# Accelerate config for 4xH100 FSDP training of Qwen2.5 student models.
#
# Qwen2.5 uses Qwen2DecoderLayer blocks. Do not use the Llama FSDP config for
# Phase C student training; PEFT/FSDP auto-wrap will fail to find the layer.

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
num_machines: 1
num_processes: 4
mixed_precision: bf16
gpu_ids: all
machine_rank: 0
main_training_function: main
rdzv_backend: static
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: Qwen2DecoderLayer
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_cpu_ram_efficient_loading: true
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
  fsdp_forward_prefetch: true
  # PEFT + Qwen2.5 + PyTorch 2.10 non-reentrant activation checkpointing can
  # recompute a different tensor set during backward. With micro-batch 1 on
  # 4xH100, disabling this is the safer Phase C default.
  fsdp_activation_checkpointing: false
