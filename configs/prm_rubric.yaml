# =============================================================================
# DDI-PRM step-level reward rubric
# -----------------------------------------------------------------------------
# Compatible with Med-PRM (EMNLP '25): each reasoning step ends with the
# separator token " ки" and the PRM outputs " +" (step valid) or " -" (step
# invalid) at that position. This file defines:
#
#   1. Step schema the teacher must emit
#   2. Dimensions the PRM is trained to score
#   3. How a gold +/- label is auto-derived for each step from Phase A
#      artifacts (labels_hierarchical.parquet + pair_signatures.parquet +
#      drug tables); no human annotation is required for the large-scale
#      PRM training set.
#   4. Step aggregation rules (refine / keep / drop)
#
# Design principle: every dimension below must be auto-verifiable against
# ground truth from Phase A. Dimensions that cannot be checked
# programmatically are not included in the PRM training signal.
# =============================================================================

version: "1.0"
separator_token: " ки"        # Med-PRM convention (kept unchanged)
reward_tokens:
  valid:  " +"
  invalid: " -"

# -----------------------------------------------------------------------------
# Teacher step schema
# -----------------------------------------------------------------------------
step_schema:
  required_fields:
    - step_id            # int, 1-indexed, monotonically increasing
    - claim              # natural-language single-sentence claim
    - evidence_ids       # list[str]; MUST resolve to retrieved context IDs
    - role               # one of: "pathway", "protein", "pk_flag",
                         #         "structural", "atc", "direction", "conclusion"
    - direction_tag      # one of: "a_to_b", "b_to_a", "bidirectional", "n/a"
                         # "n/a" allowed for pure-mechanism steps; conclusion
                         # step MUST NOT be "n/a"
  optional_fields:
    - polarity           # "up" | "down" | "risk" | "risk_down" | null
    - family_hint        # one of the 7 families (used to condition later steps)

final_answer_schema:
  required_fields:
    - family             # exact match against the 7 families
    - subtype
    - direction_tag
    - polarity
    - confidence         # 0.0-1.0 float (used for abstention calibration)
    - abstain            # bool; if true the model is declining to predict
    - summary            # ≤ summary_max_words natural-language recap
                         # (see summary_constraints below)

summary_constraints:
  max_words: 80            # soft cap — evidence-based, see notes
  hard_max_words: 120      # hard cap (rejects trace outright)
  must_mention:            # soft gate in qc.py
    - at_least_one_of_a_or_b_drug_name: true
  banned_phrases:          # re-uses BANNED_ABSTAIN_PHRASES from schema.py
  # Hedging detector (SELFDOUBT, arxiv 2604.06389).
  # We allow at most `max_hedge_density` hedging markers per 10 words
  # of summary text. If abstain=true, the hedging gate is bypassed.
  hedging_markers:
    - "may"
    - "might"
    - "possibly"
    - "potentially"
    - "likely"
    - "probably"
    - "perhaps"
    - "maybe"
    - "appears to"
    - "seems to"
    - "tends to"
    - "could be"
    - "in some cases"
    - "in certain patients"
  max_hedge_density: 0.15   # ≤ 1.5 hedges per 10 words of summary

# -----------------------------------------------------------------------------
# Step-level dimensions the PRM is trained to score
#
# Each dimension is 0/1 with an AUTO label derived from Phase-A data.  The
# final per-step gold = AND(all critical) AND (soft dims optional).  The PRM
# output is binary (+/-) at the step level; dimension breakdown is used in
# analysis / ablations but NOT exposed to the final gate.
# -----------------------------------------------------------------------------
dimensions:

  # --- CRITICAL (step is invalid if any of these fail) ---------------------
  - name: evidence_grounded
    critical: true
    description: >
      Every `evidence_id` in the step resolves to an ID from the retrieval
      context (pathway SMPDB/KEGG ID, UniProt ID, DrugBank ID, ATC code, or
      a neighbor pair_id).  Zero hallucinated entities.
    auto_label:
      source: pair_signatures + drugs + pathways_unified + drug_proteins
      rule: "step is valid iff every evidence_id ∈ context_ids set for the pair"
    notes:
      - "Mitigates hallucinated rationale entities not present in DrugBank."

  - name: direction_preserved
    critical: true
    description: >
      If the step's direction_tag is a_to_b or b_to_a, it must match the
      gold direction from labels_hierarchical for this pair. Bidirectional
      steps must be on bidirectional pairs.
    auto_label:
      source: labels_hierarchical.parquet
      rule: |
        bidirectional gold -> step direction_tag in {bidirectional, n/a}
        directional gold   -> step direction_tag must match
                              (subject_drugbank_id -> object_drugbank_id)
    notes:
      - "Targets the direction-flip failure mode in mirror-pair predictions."
      - "Complements the MPS evaluation metric."

  - name: family_consistent
    critical: true
    description: >
      Any `family_hint` in the step must match the pair's gold family.  A
      conclusion-role step MUST emit family == gold.family.
    auto_label:
      source: labels_hierarchical.parquet
      rule: "family_hint == gold.family (when present); conclusion.family == gold.family"

  # --- SOFT (signal contributes to PRM logit, but not a hard gate) ---------
  - name: pk_flag_consistent
    critical: false
    description: >
      If the step cites a CYP/P-gp/BCRP/OATP mechanism, the corresponding
      pk_features flag for the named drug must be True in pk_features.parquet.
    auto_label:
      source: pk_features.parquet
      rule: |
        regex-match the step claim for "CYP(\d)(\w\d)" / "P-?gp" / "BCRP" /
        "OATP"; if matched, check (subject_drug, flag) == True in pk_features.

  - name: relevance
    critical: false
    description: >
      The step's role is one of the allowed values AND the step references
      at least one of the two drugs in the pair (by name or DB id).
    auto_label:
      source: pair metadata
      rule: "at least one {a_name, a_id, b_name, b_id} mentioned in claim"

  - name: no_silent_abstain
    critical: false
    description: >
      The step does not use silence-as-abstention phrasing ("I cannot",
      "insufficient information") without the final_answer.abstain=True
      flag. Abstention must be explicit in final_answer, not smuggled in
      mid-chain.
    notes:
      - "Mitigates silence-rewards-precision: a hedged rationale paired with an arbitrary final family."

# -----------------------------------------------------------------------------
# Step aggregation (used by the PRM-guided critic)
#
# step_score ∈ [0,1]  (PRM softmax(+) prob, Med-PRM convention)
# trace_score = aggregator(step_scores)
#
# We keep BOTH final_plus (last-step score) AND min_plus (weakest step)
# because:
#   - final_plus indicates conclusion confidence
#   - min_plus catches a single invalid step in otherwise-good reasoning
#     (matches Med-PRM eq. 3; chosen for their EMNLP-25 result)
# -----------------------------------------------------------------------------
aggregation:
  primary_score: "min_plus"       # take the worst step — conservative
  secondary_score: "final_plus"   # conclusion correctness
  refinement_threshold: 0.60      # below this → PRM critique + regenerate
  drop_threshold: 0.30            # below this after refinement → drop from teacher_clean
  acceptance_threshold: 0.80      # above this → accept unchanged

# -----------------------------------------------------------------------------
# Teacher generation constraints (passed to the generation prompt)
# -----------------------------------------------------------------------------
teacher_generation:
  # 24 candidates per teacher x 3 teacher families = 72 candidate traces
  # per pair; the PRM selects the highest-scoring trace.
  #
  # Rationale for N=24 per teacher:
  #   - Best-of-N saturation curve (quality gain ~ log N):
  #       * Med-PRM (EMNLP '25, arxiv 2506.11474) — medical QA + PRM, N=16
  #       * Math-Shepherd (arxiv 2312.08935) — math + PRM, N=64
  #       * Lightman et al. 2023 "Verify Step by Step" — hard math, N=1860
  #   - The DDI task (7 families x ~147 subtypes x direction x polarity)
  #     is harder than MedQA but more structured than competition math, so
  #     N=24 sits between Med-PRM and Math-Shepherd.
  #   - Three teacher families already supply inter-model diversity, so
  #     72 total candidates/pair is dense enough for the PRM to
  #     discriminate mechanistic reasoning quality.
  n_candidates_per_pair: 24
  temperature: 0.8                 # default; the schedule below overrides
  top_p: 0.9
  max_steps: 8
  min_steps: 3
  max_tokens_per_step: 60
  min_tokens_per_step: 10
  summary_max_words: 80
  summary_hard_max_words: 120
  log_generation_config: true
  # Temperature diversification across the 24 candidates per teacher.
  # Schedule covers [0.30, 1.00] with denser sampling in the [0.60, 0.85]
  # band. Each candidate uses an independent per-candidate seed so the
  # samples are independent draws.
  candidate_temperatures:
    - 0.30     # low-T: conservative, high-agreement answers
    - 0.40
    - 0.50
    - 0.60
    - 0.65
    - 0.70     # mid-T band — most "useful" diversity lives here
    - 0.75
    - 0.80
    - 0.85
    - 0.90
    - 0.95
    - 1.00     # high-T: creative alternatives
    - 0.35     # second pass with slight offsets
    - 0.45
    - 0.55
    - 0.65
    - 0.70
    - 0.75
    - 0.80
    - 0.85
    - 0.90
    - 0.95
    - 1.00
    - 0.60

# Ensemble-of-teachers (diversification). The generator iterates this
# list and writes the teacher_id on every record.
teacher_models:
  - id:   "llama-3.3-70b"
    path: "meta-llama/Llama-3.3-70B-Instruct"
    family: "llama"
  - id:   "qwen-2.5-72b"
    path: "Qwen/Qwen2.5-72B-Instruct"
    family: "qwen"
  - id:   "deepseek-r1-distill-70b"
    path: "deepseek-ai/DeepSeek-R1-Distill-Llama-70B"
    family: "deepseek"

# Out-of-family LLM-as-judge (used as an additional QC layer).
# Runs on a ~2k held-out sample only; used for calibration diagnostics,
# not as a hard gate on the cleaned teacher corpus.
judge_llm:
  provider: "openai"              # or "anthropic"
  model:    "gpt-4o"              # out-of-family relative to llama/qwen/deepseek
  sample_size: 2000
  agreement_metric: "final_family_exact"

# -----------------------------------------------------------------------------
# Per-dimension weight used for analysis table in the paper (not for training)
# -----------------------------------------------------------------------------
paper_dimension_weights:
  evidence_grounded: 0.30
  direction_preserved: 0.25
  family_consistent: 0.20
  pk_flag_consistent: 0.10
  relevance: 0.10
  no_silent_abstain: 0.05

# -----------------------------------------------------------------------------
# Reproducibility
# -----------------------------------------------------------------------------
audit:
  derived_from:
    - data_processed/labels_hierarchical.parquet
    - data_processed/pair_signatures.parquet
    - data_processed/pathways_unified.parquet
    - data_processed/drug_proteins.parquet
    - data_processed/drugs.parquet
    - data_processed/pk_features.parquet
  phase_a_freeze: outputs/audit/phase_a_artifacts_sha256.txt
  rubric_sha_file: outputs/audit/prm_rubric_sha256.txt
