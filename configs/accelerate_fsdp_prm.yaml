# Accelerate config for 4×H100 FSDP training of DDI-PRM (8B backbone).
#
# This is a PRM-specific variant of accelerate_fsdp.yaml that DISABLES
# fsdp_activation_checkpointing.
#
# Why: torch 2.10 + transformers SDPA backward + Llama GQA + activation
# checkpointing recompute combine into a known shape-mismatch crash:
#   "RuntimeError: The expanded size of the tensor (1136) must match the
#    existing size (568) at non-singleton dimension 3."
# The bug only triggers in the gradient-checkpoint recompute path. With
# checkpointing OFF, SDPA backward runs once normally and is correct.
#
# Memory budget (8B Llama + LoRA r=16, bs=2, seq=3072, 4×H100 80GB FSDP):
#   - 8B BF16 weights, sharded ÷4   ≈  4.0 GB / GPU
#   - LoRA grads + AdamW (only LoRA) ≈  0.2 GB / GPU
#   - Activations (no checkpointing) ≈ 18-22 GB / GPU
#   - FSDP all-gather buffers       ≈  2-4 GB / GPU
#   - Total                          ≈ 25-30 GB / GPU   (well under 80 GB)
#
# Activate:  source scripts/slurm/activate_env.sh
# Launch:    accelerate launch --config_file configs/accelerate_fsdp_prm.yaml ...

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
num_machines: 1
num_processes: 4
mixed_precision: bf16
gpu_ids: all
machine_rank: 0
main_training_function: main
rdzv_backend: static
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: LlamaDecoderLayer
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_cpu_ram_efficient_loading: true
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
  fsdp_forward_prefetch: true
  fsdp_activation_checkpointing: false
